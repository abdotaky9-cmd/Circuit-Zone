<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Zone — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="store.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <header id="topbar">
    <a href="home.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Home
    </a>
    <div class="topbar-logo">CIRCUIT <span>ZONE</span></div>
    <div class="topbar-right">
      <div class="points-badge" id="profile-points-display">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="pts-val">0</span> pts
      </div>
      <div class="cart-btn" onclick="goToCart()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-count" id="cart-count">0</span>
      </div>
    </div>
  </header>

  <main class="profile-shell">
    <section class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar" id="avatar-wrapper">
          <img id="avatar-image" src="" alt="Profile Avatar">
        </div>
        <div class="profile-meta">
          <div class="profile-name" id="profile-name">Guest</div>
          <div class="profile-role">Circuit Zone Member</div>
          <button class="upload-btn" onclick="document.getElementById('avatar-input').click()">Upload Avatar</button>
          <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
        </div>
      </div>

      <div class="progress-shell">
        <div class="progress-label">
          <span>Points Progress</span>
          <span id="points-summary">0 / 170 pts</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-details">
          <span id="points-total">0 pts</span>
          <span>Next reward at 170 pts</span>
        </div>
      </div>

      <div class="history-list" id="purchase-history"></div>
    </section>

    <section class="profile-card">
      <div class="history-row" style="margin-bottom:16px;">
        <div class="history-name">Activity Log</div>
      </div>
      <div class="activity-list" id="activity-log"></div>
    </section>
  </main>

  <script src="system.js"></script>
  <script src="profile.js"></script>
</body>
</html>
