<!doctype html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Circuit Zone</title>

  <!-- PREMIUM FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="login.css">

</head>

<body>

  <div class="background-blur"></div>

  <div class="login-wrapper">

    <div class="login-box">

      <!-- LANGUAGE BUTTON -->
      <div class="lang-switch" onclick="toggleLang()">
        🌐 <span id="langText">EN</span>
      </div>

      <!-- LOGO -->
      <div class="logo">
        Circuit Zone
      </div>

      <!-- INPUTS -->
      <input type="text" id="username" placeholder="Username or Email">

      <input type="password" id="password" placeholder="Password">

      <!-- GOVERNORATES -->
      <select id="governorate"></select>

      <!-- LOGIN BUTTON -->
      <button onclick="login()">LOGIN</button>

      <div class="msg" id="msg"></div>

    </div>

  </div>

  <script src="login.js"></script>

</body>

</html>
