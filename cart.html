<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circuit Zone — Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="store.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <header id="topbar">
    <a href="home.html" class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Home
    </a>
    <div class="topbar-logo">CIRCUIT <span>ZONE</span></div>
    <div class="topbar-right">
      <div class="points-badge" id="points-display">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="pts-val">0</span> pts
      </div>
      <div class="profile-btn" onclick="goToProfile()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
    </div>
  </header>

  <div id="toast"></div>

  <main class="cart-shell">
    <section class="cart-card">
      <div class="page-tag">Cart Overview</div>
      <div class="profile-name" style="margin-top:12px;">Your Global Shopping Cart</div>
      <p class="page-sub" style="margin-top:12px;max-width:700px;">Review every selected GPU, CPU, and Motherboard from across Circuit Zone. Adjust quantities or complete checkout with points tracked instantly.</p>
    </section>

    <section class="cart-panel">
      <div class="cart-section" id="cart-items-root"></div>
      <div class="cart-section">
        <div class="cart-card">
          <div class="summary-card">
            <span>Total items</span>
            <strong id="summary-count">0</strong>
          </div>
          <div class="summary-card">
            <span>Total price</span>
            <strong id="summary-total">0 EGP</strong>
          </div>
          <div class="summary-card">
            <span>Points earned</span>
            <strong id="summary-points">0</strong>
          </div>
          <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
      </div>
    </section>
  </main>

  <script src="system.js"></script>
  <script src="cart.js"></script>
</body>
</html>
